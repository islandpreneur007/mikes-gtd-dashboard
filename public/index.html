<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mike's GTD Command Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e8eaed;min-height:100vh}
header{background:#1a1d27;padding:20px 30px;border-bottom:2px solid #2d3139;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.4rem;color:#fff}
.header-status span{margin-left:15px;font-size:0.8rem;color:#7ec8a3}
.tabs{display:flex;background:#1a1d27;border-bottom:1px solid #2d3139;overflow-x:auto}
.tab{padding:12px 24px;cursor:pointer;border:none;background:none;color:#9ba1ab;font-size:0.95rem;white-space:nowrap;border-bottom:3px solid transparent}
.tab:hover{color:#e8eaed}
.tab.active{color:#7ec8a3;border-bottom-color:#7ec8a3;font-weight:600}
.main{padding:24px}
.section{display:none}
.section.active{display:block}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#1a1d27;border-radius:10px;padding:16px;border:1px solid #2d3139;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:#7ec8a3}
.stat-card .label{font-size:0.75rem;color:#9ba1ab;margin-top:4px}
.item-list{max-height:65vh;overflow-y:auto}
.item-card{background:#1a1d27;border-radius:8px;padding:14px 16px;margin-bottom:10px;border:1px solid #2d3139;transition:border-color 0.2s}
.item-card:hover{border-color:#3d4149}
.item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.item-name{font-size:0.95rem;font-weight:600;color:#e8eaed}
.item-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:600}
.badge-p1{background:#e53e3e;color:#fff}
.badge-p2{background:#dd9e14;color:#fff}
.badge-p3{background:#3182ce;color:#fff}
.badge-p4{background:#4a5568;color:#9ba1ab}
.badge-new{background:#7ec8a3;color:#0f1117}
.badge-processing{background:#dd9e14;color:#0f1117}
.badge-actionable{background:#3182ce;color:#fff}
.badge-done{background:#4a5568;color:#9ba1ab}
.meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.meta span{font-size:0.72rem;color:#9ba1ab;background:#0f1117;padding:2px 8px;border-radius:6px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-green{background:#7ec8a3}
.status-yellow{background:#dd9e14}
.status-red{background:#e53e3e}
.add-form{background:#1a1d27;border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid #2d3139}
.add-form h3{font-size:0.9rem;color:#7ec8a3;margin-bottom:12px}
.add-form-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.add-form input{flex:1;min-width:160px;padding:8px 12px;border-radius:6px;border:1px solid #2d3139;background:#0f1117;color:#e8eaed;font-size:0.85rem}
.add-form input:focus{outline:none;border-color:#7ec8a3}
.add-form select{padding:8px 12px;border-radius:6px;border:1px solid #2d3139;background:#0f1117;color:#e8eaed;font-size:0.85rem}
.add-form button{padding:8px 20px;border-radius:6px;border:none;background:#7ec8a3;color:#0f1117;font-weight:600;cursor:pointer;font-size:0.85rem}
.add-form button:hover{background:#6bb890}
.loading{text-align:center;padding:40px;color:#9ba1ab}
.loading::after{content:' ...';animation:dots 1.5s infinite}
@keyframes dots{0%{content:' .'}40%{content:' ..'}80%{content:' ...'}}
.error-msg{padding:12px;background:#3d1a1a;border:1px solid #e53e3e;border-radius:8px;color:#fc8181;margin-bottom:16px;font-size:0.85rem}
</style>
</head>
<body>
<header>
  <h1>🎯 Mike's GTD Command Center</h1>
  <div class="header-status">
    <span id="clock"></span>
    <span id="sync-status">● Synced</span>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('inbox')">📥 Inbox</button>
  <button class="tab" onclick="switchTab('goals')">🎯 Goals</button>
  <button class="tab" onclick="switchTab('projects')">📁 Projects</button>
  <button class="tab" onclick="switchTab('nextactions')">✅ Next Actions</button>
  <button class="tab" onclick="switchTab('waitingfor')">⏳ Waiting For</button>
  <button class="tab" onclick="switchTab('somedaymaybe')">💡 Someday</button>
</div>
<div class="main">
  <div id="error-box" class="error-msg" style="display:none"></div>
  <div id="stats-bar" class="stats-bar"></div>
  <div id="add-form-container"></div>
  <div id="item-list" class="item-list">
    <div class="loading">Loading</div>
  </div>
</div>
<script>
const TABS = {
  inbox: { title: '📥 Inbox', stats: ['New','Processing','Actionable','Done'] },
  goals: { title: '🎯 Goals', stats: ['🟢 Active','🟡 Reviewing','🔴 Stalled'] },
  projects: { title: '📁 Projects', stats: ['Active','Waiting','Stalled','Someday'] },
  nextactions: { title: '✅ Next Actions', stats: ['P1','P2','P3','P4'] },
  waitingfor: { title: '⏳ Waiting For', stats: ['Waiting','Follow-up due'] },
  somedaymaybe: { title: '💡 Someday Maybe', stats: ['Active','Maybe someday'] },
};
const AREAS = ['Career / Work','Health / Fitness','Relationships','Finances','Learning / Growth','Home / Logistics','Personal Systems'];
const PRIORITIES = { inbox: ['P1','P2','P3','P4'], goals: ['🟢','🟡','🔴'], projects: ['Active','Waiting','Stalled','Someday'], nextactions: ['P1','P2','P3','P4'], waitingfor: ['Waiting'], somedaymaybe: ['Active','Someday'] };
let currentTab = 'inbox';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  loadTab(tab);
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
async function loadTab(tab) {
  document.getElementById('item-list').innerHTML = '<div class="loading">Loading</div>';
  document.getElementById('stats-bar').innerHTML = '';
  renderAddForm(tab);
  try {
    const r = await fetch(`/api/notion?section=${tab}`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to load');
    renderItems(tab, data.pages || []);
    renderStats(tab, data.pages || []);
  } catch (e) {
    showError(e.message);
    document.getElementById('item-list').innerHTML = '<div class="loading">Error loading data — check API connection</div>';
  }
}
function renderStats(tab, pages) {
  const s = TABS[tab].stats;
  const counts = {};
  s.forEach(k => { counts[k] = 0; });
  pages.forEach(p => {
    const v = p.Priority || p.Status || p['Why It Matters'] || '';
    for (const k of s) { if (v.includes(k[0]) || v.includes(k)) counts[k]++; }
  });
  document.getElementById('stats-bar').innerHTML = s.map(k => `<div class="stat-card"><div class="num">${counts[k]}</div><div class="label">${k}</div></div>`).join('');
}
function renderItems(tab, pages) {
  if (!pages.length) {
    document.getElementById('item-list').innerHTML = '<div class="loading">No items yet — use the form above to add one</div>';
    return;
  }
  document.getElementById('item-list').innerHTML = pages.map(p => {
    const name = p.Name || '(unnamed)';
    const badge = p.Priority || p.Status || '';
    const badgeClass = badge.startsWith('P1')||badge==='🟢'||badge==='Active'?'badge-p1':badge.startsWith('P2')||badge==='🟡'||badge==='Waiting'?'badge-p2':badge.startsWith('P3')||badge==='🔴'||badge==='Stalled'?'badge-p3':'badge-p4';
    const area = (p.Area && p.Area.length) ? p.Area.join(', ') : '';
    const status = p.Status || '';
    const context = p.Context ? p.Context.join(', ') : '';
    const energy = p.Energy || '';
    const nextAction = p['Next Action'] || '';
    const waitingOn = p['Waiting On'] || '';
    const since = p.Since || '';
    const followUp = p['Follow Up'] || '';
    const why = p['Why It Matters'] || '';
    let meta = '';
    if (area) meta += `<span>📌 ${area}</span>`;
    if (context) meta += `<span>📍 ${context}</span>`;
    if (energy) meta += `<span>⚡ ${energy}</span>`;
    if (status) meta += `<span>${status.startsWith('🟢')?'🟢':status.startsWith('🟡')?'🟡':status.startsWith('🔴')?'🔴':'●'} ${status}</span>`;
    if (nextAction) meta += `<span>→ ${nextAction}</span>`;
    if (waitingOn) meta += `<span>⏳ ${waitingOn}</span>`;
    if (since) meta += `<span>📅 Since ${since}</span>`;
    if (followUp) meta += `<span>🔔 Follow up ${followUp}</span>`;
    if (why) meta += `<span>💡 ${why}</span>`;
    return `<div class="item-card">
      <div class="item-header">
        <div class="item-name">${name}</div>
        ${badge ? `<span class="item-badge ${badgeClass}">${badge}</span>` : ''}
      </div>
      <div class="meta">${meta}</div>
    </div>`;
  }).join('');
}
function renderAddForm(tab) {
  const priorities = PRIORITIES[tab] || [];
  const areaOpts = AREAS.map(a => `<option value="${a}">${a}</option>`).join('');
  const prioOpts = priorities.map(p => `<option value="${p}">${p}</option>`).join('');
  let fields = '';
  if (tab === 'inbox') fields = `<select id="f-priority"><option value="">Priority...</option>${prioOpts}</select><select id="f-area"><option value="">Area...</option>${areaOpts}</select>`;
  else if (tab === 'goals') fields = `<input id="f-why" placeholder="Why it matters..." style="flex:2"><select id="f-status"><option value="">Status...</option>${prioOpts}</select>`;
  else if (tab === 'projects') fields = `<select id="f-area"><option value="">Area...</option>${areaOpts}</select><select id="f-status"><option value="">Status...</option>${prioOpts}</select><input id="f-next" placeholder="Next action..." style="flex:2">`;
  else if (tab === 'nextactions') fields = `<select id="f-priority"><option value="">Priority...</option>${prioOpts}</select><select id="f-context"><option value="">Context...</option><option>@work</option><option>@home</option><option>@calls</option><option>@computer</option><option>@errands</option><option>@anywhere</option><option>@thinking</option></select><select id="f-energy"><option value="">Energy...</option><option>Deep Work</option><option>Admin</option><option>Communication</option><option>Errand</option><option>Maintenance</option><option>Planning</option></select><select id="f-area"><option value="">Area...</option>${areaOpts}</select>`;
  else if (tab === 'waitingfor') fields = `<input id="f-waitingOn" placeholder="Waiting on..." style="flex:2"><input id="f-need" placeholder="Need..." style="flex:1"><input id="f-since" type="date" style="flex:1"><input id="f-followUp" type="date" style="flex:1">`;
  else if (tab === 'somedaymaybe') fields = `<select id="f-area"><option value="">Area...</option>${areaOpts}</select>`;
  document.getElementById('add-form-container').innerHTML = `<div class="add-form">
    <h3>+ Add ${TABS[tab].title.replace(/📌|🎯|📁|✅|⏳|💡 /g,'')} Item</h3>
    <div class="add-form-row">
      <input id="f-name" placeholder="Item name..." style="flex:2">
      ${fields}
    </div>
    <div class="add-form-row">
      <button onclick="addItem('${tab}')">Add to ${TABS[tab].title}</button>
    </div>
  </div>`;
}
async function addItem(tab) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showError('Please enter a name'); return; }
  const body = { name };
  const get = id => document.getElementById(id)?.value?.trim();
  const getVal = id => document.getElementById(id)?.value;
  if (tab === 'inbox') {
    if (getVal('f-priority')) body.priority = getVal('f-priority');
    if (getVal('f-area')) body.area = getVal('f-area');
  } else if (tab === 'goals') {
    if (get('f-why')) body.why = get('f-why');
    if (getVal('f-status')) body.status = getVal('f-status');
  } else if (tab === 'projects') {
    if (getVal('f-area')) body.area = getVal('f-area');
    if (getVal('f-status')) body.status = getVal('f-status');
    if (get('f-next')) body.nextAction = get('f-next');
  } else if (tab === 'nextactions') {
    if (getVal('f-priority')) body.priority = getVal('f-priority');
    if (getVal('f-context')) body.context = getVal('f-context');
    if (getVal('f-energy')) body.energy = getVal('f-energy');
    if (getVal('f-area')) body.area = getVal('f-area');
  } else if (tab === 'waitingfor') {
    if (get('f-waitingOn')) body.waitingOn = get('f-waitingOn');
    if (get('f-need')) body.need = get('f-need');
    if (getVal('f-since')) body.since = getVal('f-since');
    if (getVal('f-followUp')) body.followUp = getVal('f-followUp');
  } else if (tab === 'somedaymaybe') {
    if (getVal('f-area')) body.area = getVal('f-area');
  }
  try {
    const r = await fetch(`/api/notion?section=${tab}&action=add`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed to add');
    document.getElementById('f-name').value = '';
    loadTab(tab);
  } catch (e) { showError(e.message); }
}
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}
updateClock();
setInterval(updateClock, 10000);
loadTab('inbox');
</script>
</body>
</html>
